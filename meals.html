<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Fitness Planner • Meal Plan</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="meals">
    <header class="nav">
      <div class="container">
        <a class="brand" href="index.html"><span class="brand-badge" aria-hidden="true"></span>AI Fitness</a>
        <nav class="navlinks" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="profile.html">Profile</a>
          <a href="workouts.html">Workouts</a>
          <a href="meals.html">Meals</a>
          <a href="tracker.html">Tracker</a>
          <a href="fitness_calc.html">Calculator</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>7-day meal plan</h1>
        <p>Generated locally from your goal, diet preference, and calorie/macro targets.</p>
        <div id="statusPills" class="actions" aria-live="polite"></div>
        <div class="actions">
          <button class="btn" id="regenMealsBtn" type="button">Regenerate meal plan</button>
          <a class="btn primary" href="tracker.html">Log weight</a>
        </div>
        <div id="mealNotice" class="notice" style="margin-top: 14px;">
          <strong>Nutrition note</strong>
          <div class="muted">Meals scale automatically to match your calorie target.</div>
        </div>
      </section>

      <div id="mealHeader" style="margin-top: 16px;"></div>

      <section class="grid" style="margin-top: 16px;">
        <div class="col-12" id="mealPlanWrap" style="display:grid;gap:16px;"></div>
      </section>

      <div class="footer">Meals • Calories & macros • Offline plan</div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
